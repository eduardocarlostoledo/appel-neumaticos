[build]
  command = "npm ci && npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "20.17" }

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; script-src 'self' 'sha256-iO/xPe1sfAVzqX5AxzbdVRY5jtFKWIRJBbeOFcQ302Y=' 'sha256-+UDxsZJ09cTqt7mlIm7fBOibf+rSE2lWPYyX4C7Bl8E='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-src 'none'; upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"
